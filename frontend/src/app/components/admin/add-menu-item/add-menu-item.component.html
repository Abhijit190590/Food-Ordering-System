<div class="page-container fade-in">
    <h1 class="page-title">🍽️ Add Menu Item</h1>
    <div class="admin-form card">
        <div class="alert alert-error" *ngIf="error">{{error}}</div>
        <div class="alert alert-success" *ngIf="success">{{success}}</div>
        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="restaurant">Select Restaurant</label>
                <select id="restaurant" [(ngModel)]="restaurant" name="restaurant" required>
                    <option value="" disabled>-- Choose a restaurant --</option>
                    <option *ngFor="let r of restaurants" [value]="r._id">{{r.name}}</option>
                </select>
            </div>
            <div class="form-group">
                <label for="name">Item Name</label>
                <input type="text" id="name" [(ngModel)]="name" name="name" placeholder="e.g. Margherita Pizza"
                    required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" [(ngModel)]="description" name="description" rows="2"
                    placeholder="Describe the dish..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="price">Price (₹)</label>
                    <input type="number" id="price" [(ngModel)]="price" name="price" required min="0">
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" [(ngModel)]="category" name="category">
                        <option>Starters</option>
                        <option>Main Course</option>
                        <option>Breads</option>
                        <option>Rice & Biryani</option>
                        <option>Desserts</option>
                        <option>Beverages</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="isVeg">Type</label>
                    <select id="isVeg" [(ngModel)]="isVeg" name="isVeg">
                        <option [ngValue]="true">🟢 Veg</option>
                        <option [ngValue]="false">🔴 Non-Veg</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="imageUrl">Image URL</label>
                <input type="text" id="imageUrl" [(ngModel)]="imageUrl" name="imageUrl" placeholder="https://...">
            </div>
            <button type="submit" class="btn btn-primary btn-full" [disabled]="loading || !restaurant">
                {{loading ? 'Adding...' : 'Add Menu Item'}}
            </button>
        </form>
    </div>
</div>
