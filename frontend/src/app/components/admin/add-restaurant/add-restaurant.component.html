<div class="page-container fade-in">
    <h1 class="page-title">🏪 Add Restaurant</h1>
    <div class="admin-form card">
        <div class="alert alert-error" *ngIf="error">{{error}}</div>
        <div class="alert alert-success" *ngIf="success">{{success}}</div>
        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="name">Restaurant Name</label>
                <input type="text" id="name" [(ngModel)]="name" name="name" placeholder="e.g. Pizza Palace" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" [(ngModel)]="description" name="description" rows="3"
                    placeholder="Tell customers about this restaurant..."></textarea>
            </div>
            <div class="form-group">
                <label for="imageUrl">Image URL</label>
                <input type="text" id="imageUrl" [(ngModel)]="imageUrl" name="imageUrl" placeholder="https://...">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="cuisineType">Cuisine Type</label>
                    <input type="text" id="cuisineType" [(ngModel)]="cuisineType" name="cuisineType">
                </div>
                <div class="form-group">
                    <label for="deliveryTime">Delivery Time</label>
                    <input type="text" id="deliveryTime" [(ngModel)]="deliveryTime" name="deliveryTime">
                </div>
                <div class="form-group">
                    <label for="minOrder">Min Order (₹)</label>
                    <input type="number" id="minOrder" [(ngModel)]="minOrder" name="minOrder">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
                {{loading ? 'Adding...' : 'Add Restaurant'}}
            </button>
        </form>
    </div>
</div>
