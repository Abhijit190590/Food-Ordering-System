<div class="auth-page fade-in">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🍔</span>
            <h2>Welcome Back</h2>
            <p>Sign in to order your favourite food</p>
        </div>
        <div class="alert alert-error" *ngIf="error">{{error}}</div>
        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="••••••••"
                    required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
                {{loading ? 'Signing in...' : 'Sign In'}}
            </button>
        </form>
        <p class="auth-footer">Don't have an account? <a routerLink="/register">Sign Up</a></p>
    </div>
</div>
