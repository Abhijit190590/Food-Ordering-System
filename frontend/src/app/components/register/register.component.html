<div class="auth-page fade-in">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🍕</span>
            <h2>Create Account</h2>
            <p>Join FoodExpress and start ordering</p>
        </div>
        <div class="alert alert-error" *ngIf="error">{{error}}</div>
        <form (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" [(ngModel)]="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" [(ngModel)]="password" name="password"
                    placeholder="Min 6 characters" required>
            </div>
            <div class="form-group">
                <label for="role">Register as</label>
                <select id="role" [(ngModel)]="role" name="role">
                    <option value="user">Customer</option>
                    <option value="admin">Admin / Restaurant Owner</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
                {{loading ? 'Creating account...' : 'Sign Up'}}
            </button>
        </form>
        <p class="auth-footer">Already have an account? <a routerLink="/login">Sign In</a></p>
    </div>
</div>
